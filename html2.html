<!DOCTYPE HTML>
<html>
    <head>
        <title>For My Girl 💗🌕| May Thiri Ko</title>
        <link href="style2.css" rel="stylesheet">
    </head>

    <body>
        <div class="container">
            <div class="card-wrapper">
                <div class="card">
                    <h1 class="girl-name">💗 Dear May Thiri Ko 💗</h1>
                    <p class="subtitle">Thank you for letting me have you in my life!</p>
                    
                    <h2 class="section-title">Time Together</h2>
                    
                    <div class="countdown">
                        <div class="time-box">
                            <span id="years">00</span>
                            <p>Years</p>
                        </div>
                        <div class="time-box">
                            <span id="months">00</span>
                            <p>Months</p>
                        </div>
                        <div class="time-box">
                            <span id="days">00</span>
                            <p>Days</p>
                        </div>
                        <div class="time-box">
                            <span id="hours">00</span>
                            <p>Hours</p>
                        </div>
                        <div class="time-box">
                            <span id="minutes">00</span>
                            <p>Mins</p>
                        </div>
                        <div class="time-box">
                            <span id="seconds">00</span>
                            <p>Secs</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
           
           const startDate = new Date("June 24, 2026 00:00:00");

            function updateTracker() {
                const now = new Date();
                
                let years = now.getFullYear() - startDate.getFullYear();
                let months = now.getMonth() - startDate.getMonth();
                let days = now.getDate() - startDate.getDate();
                let hours = now.getHours() - startDate.getHours();
                let minutes = now.getMinutes() - startDate.getMinutes();
                let seconds = now.getSeconds() - startDate.getSeconds();

                if (seconds < 0) {
                    seconds += 60;
                    minutes--;
                }
                if (minutes < 0) {
                    minutes += 60;
                    hours--;
                }
                if (hours < 0) {
                    hours += 24;
                    days--;
                }
                if (days < 0) {
                    const previousMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                    days += previousMonth;
                    months--;
                }
                if (months < 0) {
                    months += 12;
                    years--;
                }

                document.getElementById("years").innerHTML = years < 10 ? "0" + years : years;
                document.getElementById("months").innerHTML = months < 10 ? "0" + months : months;
                document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            }

            setInterval(updateTracker, 1000);
            updateTracker();
        </script>
    </body>
</html>
